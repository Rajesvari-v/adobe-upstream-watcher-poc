name: Watch Adobe Upstream Repo

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM CDT / 9:00 AM CST
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-main:
    runs-on: ubuntu-latest
    outputs:
      issue_created: ${{ steps.create_issue.outputs.created }}
      previous_sha: ${{ steps.stored.outputs.sha }}
      current_sha: ${{ steps.upstream.outputs.sha }}
      compare_url: ${{ steps.urls.outputs.compare_url }}
      issue_url: ${{ steps.create_issue.outputs.issue_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest Adobe SHA for main
        id: upstream
        run: |
          RESPONSE=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/adobe/guides-extension/commits/main)
          SHA=$(echo $RESPONSE | jq -r '.sha')
          if [ -z "$SHA" ] || [ "$SHA" == "null" ]; then
            echo "Failed to fetch Adobe SHA — API may be unavailable"
            exit 1
          fi
          MESSAGE=$(echo $RESPONSE | jq -r '.commit.message' | head -1)
          AUTHOR=$(echo $RESPONSE | jq -r '.commit.author.name')
          DATE=$(echo $RESPONSE | jq -r '.commit.author.date')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Get stored SHA for main
        id: stored
        run: |
          STORED=$(cat .github/upstream-state.json | jq -r '.["main"].sha')
          echo "sha=$STORED" >> $GITHUB_OUTPUT

      - name: Compare SHAs for main
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.sha }}" != "${{ steps.stored.outputs.sha }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build URLs
        id: urls
        run: |
          COMPARE_URL="https://github.com/adobe/guides-extension/compare/${{ steps.stored.outputs.sha }}...${{ steps.upstream.outputs.sha }}"
          echo "compare_url=$COMPARE_URL" >> $GITHUB_OUTPUT

      - name: Check for existing open Issue for main
        id: existing
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "upstream-sync-main" \
            --state open \
            --json number \
            --jq 'length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Create Issue for main
        id: create_issue
        if: steps.compare.outputs.changed == 'true' && steps.existing.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_URL=$(gh issue create \
            --repo ${{ github.repository }} \
            --title "⚠️ Adobe upstream change detected — main" \
            --label "upstream-sync-main" \
            --body "## Adobe Guides Extension — Upstream Change Detected

          **Branch:** main

          **Previous SHA:**
          \`${{ steps.stored.outputs.sha }}\`

          **Current SHA:**
          \`${{ steps.upstream.outputs.sha }}\`

          **Compare:**
          ${{ steps.urls.outputs.compare_url }}

          **Commit message:** ${{ steps.upstream.outputs.message }}
          **Author:** ${{ steps.upstream.outputs.author }}
          **Date:** ${{ steps.upstream.outputs.date }}

          ## Action Required
          - [ ] Review the diff at the compare URL above
          - [ ] Assess impact on Mayo customizations
          - [ ] Apply relevant changes to this repo
          - [ ] Run **Mark Upstream Reviewed** workflow to close this issue

          > This issue was auto-generated by the upstream watcher workflow.")
          echo "created=true" >> $GITHUB_OUTPUT
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT

      - name: Update existing Issue with new change for main
        if: steps.compare.outputs.changed == 'true' && steps.existing.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "upstream-sync-main" \
            --state open \
            --json number \
            --jq '.[0].number')
          gh issue comment $ISSUE_NUMBER \
            --repo ${{ github.repository }} \
            --body "⚠️ New upstream change detected while this issue is still open.

          **New SHA:** \`${{ steps.upstream.outputs.sha }}\`
          **Compare:** ${{ steps.urls.outputs.compare_url }}
          **Commit message:** ${{ steps.upstream.outputs.message }}
          **Author:** ${{ steps.upstream.outputs.author }}
          **Date:** ${{ steps.upstream.outputs.date }}

          Please review both changes before closing this issue."

      - name: No change for main
        if: steps.compare.outputs.changed == 'false'
        run: echo "✅ No upstream changes detected for main"

  
  check-sc-expert-session:
    runs-on: ubuntu-latest
    outputs:
      issue_created: ${{ steps.create_issue.outputs.created }}
      previous_sha: ${{ steps.stored.outputs.sha }}
      current_sha: ${{ steps.upstream.outputs.sha }}
      compare_url: ${{ steps.urls.outputs.compare_url }}
      issue_url: ${{ steps.create_issue.outputs.issue_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest Adobe SHA for sc-expert-session
        id: upstream
        run: |
          RESPONSE=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/adobe/guides-extension/commits/sc-expert-session)
          SHA=$(echo $RESPONSE | jq -r '.sha')
          if [ -z "$SHA" ] || [ "$SHA" == "null" ]; then
            echo "Failed to fetch Adobe SHA — API may be unavailable"
            exit 1
          fi
          MESSAGE=$(echo $RESPONSE | jq -r '.commit.message' | head -1)
          AUTHOR=$(echo $RESPONSE | jq -r '.commit.author.name')
          DATE=$(echo $RESPONSE | jq -r '.commit.author.date')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Get stored SHA for sc-expert-session
        id: stored
        run: |
          STORED=$(cat .github/upstream-state.json | jq -r '.["sc-expert-session"].sha')
          echo "sha=$STORED" >> $GITHUB_OUTPUT

      - name: Compare SHAs for sc-expert-session
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.sha }}" != "${{ steps.stored.outputs.sha }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build URLs
        id: urls
        run: |
          COMPARE_URL="https://github.com/adobe/guides-extension/compare/${{ steps.stored.outputs.sha }}...${{ steps.upstream.outputs.sha }}"
          echo "compare_url=$COMPARE_URL" >> $GITHUB_OUTPUT

      - name: Check for existing open Issue for sc-expert-session
        id: existing
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "upstream-sync-sc-expert-session" \
            --state open \
            --json number \
            --jq 'length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Create Issue for sc-expert-session
        id: create_issue
        if: steps.compare.outputs.changed == 'true' && steps.existing.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_URL=$(gh issue create \
            --repo ${{ github.repository }} \
            --title "⚠️ Adobe upstream change detected — sc-expert-session" \
            --label "upstream-sync-sc-expert-session" \
            --body "## Adobe Guides Extension — Upstream Change Detected

          **Branch:** sc-expert-session

          **Previous SHA:**
          \`${{ steps.stored.outputs.sha }}\`

          **Current SHA:**
          \`${{ steps.upstream.outputs.sha }}\`

          **Compare:**
          ${{ steps.urls.outputs.compare_url }}

          **Commit message:** ${{ steps.upstream.outputs.message }}
          **Author:** ${{ steps.upstream.outputs.author }}
          **Date:** ${{ steps.upstream.outputs.date }}

          ## Action Required
          - [ ] Review the diff at the compare URL above
          - [ ] Assess impact on Mayo customizations
          - [ ] Apply relevant changes to this repo
          - [ ] Run **Mark Upstream Reviewed** workflow to close this issue

          > This issue was auto-generated by the upstream watcher workflow.")
          echo "created=true" >> $GITHUB_OUTPUT
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT

      - name: Update existing Issue with new change for sc-expert-session
        if: steps.compare.outputs.changed == 'true' && steps.existing.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "upstream-sync-sc-expert-session" \
            --state open \
            --json number \
            --jq '.[0].number')
          gh issue comment $ISSUE_NUMBER \
            --repo ${{ github.repository }} \
            --body "⚠️ New upstream change detected while this issue is still open.

          **New SHA:** \`${{ steps.upstream.outputs.sha }}\`
          **Compare:** ${{ steps.urls.outputs.compare_url }}
          **Commit message:** ${{ steps.upstream.outputs.message }}
          **Author:** ${{ steps.upstream.outputs.author }}
          **Date:** ${{ steps.upstream.outputs.date }}

          Please review both changes before closing this issue."

      - name: No change for sc-expert-session
        if: steps.compare.outputs.changed == 'false'
        run: echo "✅ No upstream changes detected for sc-expert-session"