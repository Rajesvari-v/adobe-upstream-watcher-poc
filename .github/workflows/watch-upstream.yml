permissions:
  issues: write
  contents: write
name: Watch Adobe Upstream Repo

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch latest Adobe main SHA
        id: upstream
        run: |
          RESPONSE=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/adobe/guides-extension/commits/main)
          SHA=$(echo $RESPONSE | jq -r '.sha')
          MESSAGE=$(echo $RESPONSE | jq -r '.commit.message' | head -1)
          AUTHOR=$(echo $RESPONSE | jq -r '.commit.author.name')
          DATE=$(echo $RESPONSE | jq -r '.commit.author.date')
          HTML_URL=$(echo $RESPONSE | jq -r '.html_url')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "html_url=$HTML_URL" >> $GITHUB_OUTPUT

      - name: Get stored SHA
        id: stored
        run: |
          STORED=$(cat .github/upstream-sha.txt 2>/dev/null || echo "")
          echo "sha=$STORED" >> $GITHUB_OUTPUT

      - name: Compare SHAs
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.sha }}" != "${{ steps.stored.outputs.sha }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Open GitHub Issue
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "⚠️ Adobe guides-extension upstream change detected" \
            --body "## Adobe Guides Extension — Upstream Change Detected

          A new commit has been pushed to Adobe's \`main\` branch.

          | Field | Details |
          |-------|---------|
          | **Commit SHA** | \`${{ steps.upstream.outputs.sha }}\` |
          | **Commit message** | ${{ steps.upstream.outputs.message }} |
          | **Author** | ${{ steps.upstream.outputs.author }} |
          | **Date** | ${{ steps.upstream.outputs.date }} |
          | **Diff link** | ${{ steps.upstream.outputs.html_url }} |

          ## Action Required
          - [ ] Review the diff at the link above
          - [ ] Assess impact on Mayo's customizations
          - [ ] Apply relevant changes to this repo
          - [ ] Close this issue when Mayo repo is up to date

          > This issue was auto-generated by the upstream watcher workflow."

      - name: Update stored SHA
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "${{ steps.upstream.outputs.sha }}" > .github/upstream-sha.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .github/upstream-sha.txt
          git commit -m "chore: update upstream Adobe SHA"
          git push

      - name: No change detected
        if: steps.compare.outputs.changed == 'false'
        run: echo "✅ No upstream changes detected. Adobe SHA matches stored value."